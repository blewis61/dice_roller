    <h1>Dice Roller</h1>

    <!-- JavaScript -->

    <script>
      function roll(sides) {
        var dice = document.querySelector('#diceCount')
        for (var i = this.dice.length - 1; i >= 0; i--) {
          return (Math.floor(Math.random() * sides + 1)
        }
      }

      function rollResults(mod, rolls) {
        var modifier = document.querySelector('#mod')
        var rolls = document.querySelector('#run')
        console.log(this.modifier + this.rolls)
      }
    </script>

    <!-- jQuery first, then Popper.js, then Bootstrap JS -->

      <p>Modifier</p>

      <div class='col-md-2'>=</div>
      <p>Roll Results</p>
      <div class='col-md-2'><input type='JavaScript' readonly id="d4_result">
        <script> rollResults() </script>
      </div>
