    <h1>Dice Roller!!!</h1>

    <!-- JavaScript -->

    <script>
      function roll(sides) {
        var numDice = document.querySelector("#diceCount-" + "d" + sides).value
        var modId = "mod-" + 'd' + sides;
        var resultId = "d" + sides + "_result"
        console.log('resultId', resultId)
        var userSides = parseInt(document.querySelector("#userSides").value)
        var total = 0;
        var numSides = 0;
        
        if(sides == 'User'){
          numSides = userSides
        }else{
          numSides = parseInt(sides)
        }


        for (var i = numDice; i > 0; i--) {
          var res =  (Math.floor(Math.random() * numSides) + 1);
          console.log("res", res);
          total = total + res;
        }
        console.log("total", total)
        modValue = parseInt(document.querySelector('#' + modId).value)
        if(modValue) total = total + modValue
        console.log("Modded-total", total)
        document.querySelector('#' + resultId).value = total;
      }

   		function prevRolls(sides) {
   			var lastRollId = "d" + sides + "_result";
   			var lastModId = "mod-" + "d" + sides; 
   			var lastRollResults = parseInt(lastRollId.value - lastModId.value)
   			var PrevRollString = 'Roll Results: ' + lastRollResults + '+' + 'Modifier: ' + lastModId.value + '=' + lastRollId.value; 	

   			document.querySelector(#pastRolls) = PrevRollString;
    	}

      

        // Each time someone rolls the individual roll including the math should be shown in the "past rolls box".
        	//The box should show the actual math behind the roll

    </script>
